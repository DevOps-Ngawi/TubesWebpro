name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        run: |
          docker build -t mfaizadya/logilearn-frontend:latest ./frontend
          docker push mfaizadya/logilearn-frontend:latest

      - name: Build & Push Backend
        run: |
          docker build -t mfaizadya/logilearn-backend:latest ./backend/express_logilearn
          docker push mfaizadya/logilearn-backend:latest
