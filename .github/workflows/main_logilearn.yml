# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - logilearn

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install backend
        working-directory: backend/express_logilearn
        run: npm install

      - name: Audit backend
        working-directory: backend/express_logilearn
        run: npm audit --audit-level=high

      - name: Build & test backend
        working-directory: backend/express_logilearn
        run: |
          npm run build --if-present
          npm run test --if-present

      - name: Install frontend
        working-directory: frontend
        run: npm install

      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C9FBEDD0421C47089E1F04FC95ECA765 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7030A561D65A43D6A6D5736B464D9E08 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C01E88EF4B8146D7BEFBD6FDEA673281 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'logilearn'
          slot-name: 'Production'
          package: backend/express_logilearn
          