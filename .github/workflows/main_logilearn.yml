# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Vercel - logilearn

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install backend
        working-directory: backend/express_logilearn
        run: npm install

      - name: Audit backend
        working-directory: backend/express_logilearn
        run: npm audit --audit-level=high || true

      - name: Build & test backend
        working-directory: backend/express_logilearn
        run: |
          npm run build --if-present
          npm run test --if-present

      - name: Install frontend
        working-directory: frontend
        run: npm install

      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      # Menggunakan Vercel CLI resmi untuk menghindari proses stuck & limitasi Git Vercel
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        working-directory: backend/express_logilearn
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: 'team_NdNm92rAgxfuQaY97ibNejWC'
          VERCEL_PROJECT_ID: 'prj_aqSuQQVO7IciEpRUnVJMS1pd2DGa'

      - name: Build Project Artifacts
        working-directory: backend/express_logilearn
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: 'team_NdNm92rAgxfuQaY97ibNejWC'
          VERCEL_PROJECT_ID: 'prj_aqSuQQVO7IciEpRUnVJMS1pd2DGa'

      - name: Deploy Project Artifacts to Vercel
        working-directory: backend/express_logilearn
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: 'team_NdNm92rAgxfuQaY97ibNejWC'
          VERCEL_PROJECT_ID: 'prj_aqSuQQVO7IciEpRUnVJMS1pd2DGa'
